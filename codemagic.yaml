# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Codemagic CI/CD — Mac不要で App Store 提出
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# セットアップ:
#   1. https://codemagic.io にGitHubでサインアップ
#   2. このリポジトリを接続
#   3. 環境変数を設定:
#      - SERVER_URL: デプロイ済みサーバーURL
#   4. Apple Developer 連携:
#      Codemagic → Settings → Code signing → iOS
#      → 「Automatic」を選択 → Apple ID でログイン
#      → 証明書とプロファイルが自動生成される
#   5. 「Start build」をクリック
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

workflows:
  ios-release:
    name: iOS App Store Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    labels:
      - ios

    environment:
      node: 22
      xcode: latest
      groups:
        - app_store_connect
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.experimentalgarden.chat
      vars:
        SERVER_URL: https://your-app.railway.app

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "release/*"
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Set server URL
        script: |
          node -e "
            const fs = require('fs');
            let c = fs.readFileSync('capacitor.config.ts','utf8');
            c = c.replace(
              /\/\/ url: .https:\/\/your-server\.example\.com./,
              'url: \"$SERVER_URL\"'
            );
            fs.writeFileSync('capacitor.config.ts', c);
          "

      - name: Build web assets
        script: npm run build:web

      - name: Add iOS platform
        script: npx cap add ios

      - name: Sync web to iOS
        script: npx cap sync ios

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace App.xcworkspace \
            --scheme App \
            --config Release

    artifacts:
      - ios/App/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  ios-test:
    name: iOS Test Build (署名なし)
    max_build_duration: 20
    instance_type: mac_mini_m2

    environment:
      node: 22
      xcode: latest
      vars:
        SERVER_URL: https://your-app.railway.app

    triggering:
      events:
        - pull_request
      cancel_previous_builds: true

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Lint & Test
        script: |
          npm run lint
          npm test

      - name: Set server URL
        script: |
          node -e "
            const fs = require('fs');
            let c = fs.readFileSync('capacitor.config.ts','utf8');
            c = c.replace(
              /\/\/ url: .https:\/\/your-server\.example\.com./,
              'url: \"$SERVER_URL\"'
            );
            fs.writeFileSync('capacitor.config.ts', c);
          "

      - name: Build web assets
        script: npm run build:web

      - name: Add iOS platform
        script: npx cap add ios

      - name: Sync web to iOS
        script: npx cap sync ios

      - name: Build (unsigned)
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
