name: Build Android (TWA)

on:
  workflow_dispatch:
    inputs:
      host:
        description: "Deployed server hostname (e.g. your-app.railway.app)"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @nickvdp/nickvdp-nickvdp-nickvdp@latest 2>/dev/null || npm install -g @nickvdp/nickvdp@latest 2>/dev/null || npm install -g @nickvdp/nickvdp 2>/dev/null || npm install -g @nickvdp/nickvdp || true

      - name: Prepare manifest
        run: |
          HOST="${{ inputs.host }}"
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('twa-manifest.json','utf8'));
            m.host = '${HOST}';
            m.iconUrl = 'https://${HOST}/icons/icon-512x512.svg';
            m.maskableIconUrl = 'https://${HOST}/icons/icon-512x512.svg';
            m.webManifestUrl = 'https://${HOST}/manifest.json';
            m.fullScopeUrl = 'https://${HOST}/';
            fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
          "

      - name: Build with Bubblewrap
        run: |
          npx bubblewrap init --manifest="https://${{ inputs.host }}/manifest.json" --directory=./twa-build
          cd twa-build
          npx bubblewrap build
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            **/*.apk
            **/*.aab
          if-no-files-found: warn
