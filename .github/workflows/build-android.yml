name: Build Android (TWA)

on:
  workflow_dispatch:
    inputs:
      deploy_url:
        description: "Deployed URL (e.g. https://your-app.railway.app)"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init TWA project
        run: |
          mkdir -p twa-build && cd twa-build
          bubblewrap init --manifest "${{ inputs.deploy_url }}/manifest.json"

      - name: Build APK and AAB
        run: |
          cd twa-build
          bubblewrap build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            twa-build/app-release-signed.apk
            twa-build/app-release-bundle.aab
          if-no-files-found: warn
